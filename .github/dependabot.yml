---
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types:
          - minor
          - patch
          - major

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
