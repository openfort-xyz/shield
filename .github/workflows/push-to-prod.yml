name: Push to prod

on:
  release:
    types: [released]

jobs:
  push_to_prod:
    name: Push to prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up SSH key
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2.8.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.SSH_HOST }}

      - name: Set up Git
        run: git config --global url.ssh://git@github.com/.insteadOf https://github.com/

      - name: Clone Infra Repository
        run: |
          git clone git@github.com:openfort-xyz/kube.git

      - name: Update version
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5
        with:
          cmd: yq -i '.shield.tag = "${{ github.event.release.tag_name }}"' kube/values.yaml

      - name: Update Infra Repository
        run: |
          cd kube
          git config --global user.email "cd@openfort.xyz"
          git config --global user.name "CD"
          git add .
          git commit -m "Update Shield version to ${{ github.event.release.tag_name }}"
          git push
